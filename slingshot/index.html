<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estilingue de Tinta</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; overflow:hidden; cursor:crosshair; }
  canvas { display:block; }
  #hint { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.4); font-family:sans-serif; font-size:14px; pointer-events:none; transition:opacity 0.5s; }
  #score-box { position:fixed; top:24px; right:28px; font-family:'Segoe UI',sans-serif; text-align:right; pointer-events:none; user-select:none; }
  #score-label { font-size:13px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  #score-value { font-size:52px; font-weight:800; line-height:1; color:#fff; text-shadow:0 0 20px rgba(255,255,255,0.3); transition:transform 0.1s; }
  #score-streak { font-size:13px; color:rgba(255,200,80,0.85); min-height:18px; letter-spacing:1px; }
  #coins-display { margin-top:6px; font-size:16px; font-weight:600; color:rgba(255,215,0,0.85); text-shadow:0 0 8px rgba(255,215,0,0.3); transition:transform 0.1s; }
  #leaderboard { position:fixed; top:50%; left:20px; transform:translateY(-50%); font-family:'Segoe UI',sans-serif; pointer-events:none; user-select:none; min-width:150px; }
  #lb-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:10px; text-align:center; }
  .lb-entry { display:flex; align-items:center; gap:8px; margin-bottom:7px; padding:6px 10px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07); }
  .lb-entry.gold   { background:rgba(255,200,30,0.12); border-color:rgba(255,200,30,0.3); }
  .lb-entry.silver { background:rgba(180,180,200,0.10); border-color:rgba(180,180,200,0.25); }
  .lb-entry.bronze { background:rgba(190,120,50,0.12); border-color:rgba(190,120,50,0.28); }
  .lb-medal { font-size:18px; line-height:1; }
  .lb-rank  { font-size:11px; color:rgba(255,255,255,0.3); width:14px; text-align:center; }
  .lb-pts   { font-size:18px; font-weight:700; color:#fff; }
  .lb-pts.gold   { color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,0.5); }
  .lb-pts.silver { color:#c0c0d8; }
  .lb-pts.bronze { color:#cd7f32; }
  .lb-new { font-size:10px; color:#7eff9a; letter-spacing:1px; animation:blink 1s 3; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
  #shop { position:fixed; bottom:20px; right:20px; display:flex; gap:10px; align-items:flex-end; }
  .shop-item { width:64px; height:80px; border-radius:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; border:1.5px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); transition:transform 0.15s,border-color 0.2s,background 0.2s; position:relative; user-select:none; font-family:'Segoe UI',sans-serif; }
  .shop-item:hover.unlocked { transform:translateY(-4px); border-color:rgba(255,215,0,0.5); background:rgba(255,215,0,0.1); }
  .shop-item.locked { filter:grayscale(1); opacity:0.55; cursor:default; }
  .shop-item.owned  { border-color:rgba(100,255,130,0.5); background:rgba(100,255,130,0.08); }
  .shop-item .icon  { font-size:26px; line-height:1; }
  .shop-item .price { font-size:10px; color:#ffd700; font-weight:700; }
  .shop-item.owned .price { color:#7eff9a; }
  .shop-item .lock  { position:absolute; top:4px; right:6px; font-size:13px; }
  .shop-item .active-badge { position:absolute; top:-6px; left:50%; transform:translateX(-50%); background:#7eff9a; color:#0a2e14; font-size:8px; font-weight:800; padding:1px 5px; border-radius:6px; letter-spacing:0.5px; white-space:nowrap; }
  #item-tooltip { position:fixed; bottom:120px; right:20px; background:rgba(10,12,30,0.95); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:10px 14px; max-width:220px; font-family:'Segoe UI',sans-serif; font-size:12px; color:rgba(255,255,255,0.85); pointer-events:none; opacity:0; transition:opacity 0.2s; line-height:1.5; }
  #item-tooltip.show { opacity:1; }
  #item-tooltip strong { color:#fff; font-size:13px; display:block; margin-bottom:4px; }
  #floating-scores { position:fixed; top:0; left:0; pointer-events:none; }
  #reset-flash { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity:0; background:rgba(255,50,50,0.18); transition:opacity 0.15s; }
  #active-effects { position:fixed; top:24px; left:50%; transform:translateX(-50%); display:flex; gap:8px; pointer-events:none; }
  .effect-badge { background:rgba(10,12,30,0.85); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:4px 10px; font-family:'Segoe UI',sans-serif; font-size:12px; color:#fff; display:flex; align-items:center; gap:5px; flex-direction:column; }
  .ebar { height:3px; border-radius:2px; background:#7eff9a; margin-top:2px; transition:width 0.1s linear; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score-box">
  <div id="score-label">Pontuação</div>
  <div id="score-value">0</div>
  <div id="score-streak"></div>
  <div id="coins-display">🪙 0 moedas</div>
</div>
<div id="leaderboard"><div id="lb-title">🏆 Recordes</div><div id="lb-list"></div></div>
<div id="shop"></div>
<div id="item-tooltip"></div>
<div id="floating-scores"></div>
<div id="reset-flash"></div>
<div id="active-effects"></div>
<div id="hint">Clique, segure e solte — acerte o centro para mais pontos!</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H*0.78;
const forkW = 36, forkH = 70;
const leftFork  = { x: cx-forkW, y: cy-forkH };
const rightFork = { x: cx+forkW, y: cy-forkH };
const restY = cy - forkH/2;
const DEPTH = 500, CHARGE_TIME = 1800;
const TARGET_BASE_X = W/2, TARGET_BASE_Y = H*0.38;
const TARGET_RINGS = [
  { r:28,  pts:100, color:'#ff2d2d', label:'100' },
  { r:60,  pts:50,  color:'#ff8c00', label:'50'  },
  { r:100, pts:30,  color:'#ffe600', label:'30'  },
  { r:148, pts:20,  color:'#44dd44', label:'20'  },
  { r:200, pts:10,  color:'#2299ff', label:'10'  },
  { r:260, pts:5,   color:'#9933ff', label:'5'   }
];
const BAG_INTERVAL = 15000, BAG_RADIUS = 32;

const SHOP_ITEMS = [
  { id:'aimguide',    icon:'🎯', name:'Mira Laser',       price:25, desc:'Mostra onde a bolinha vai cair enquanto você mira. Dura 3 arremessos.', unlockAt:15, owned:false, active:false },
  { id:'multiball',  icon:'🎱', name:'Tiro Triplo',       price:15, desc:'Próximo arremesso dispara 3 bolinhas em leque.',                        unlockAt:10, owned:false, active:false },
  { id:'slowtarget', icon:'🐢', name:'Alvo Lento',        price:12, desc:'Deixa o alvo 60% mais lento por 20 segundos.',                          unlockAt:8,  owned:false, active:false },
  { id:'doublescore',icon:'⭐', name:'Pontos Duplos',     price:20, desc:'Dobra todos os pontos ganhos por 15 segundos.',                          unlockAt:15, owned:false, active:false },
  { id:'magnet',     icon:'🧲', name:'Ímã de Moedas',    price:10, desc:'Próximo saquinho de moedas vale o dobro.',                               unlockAt:6,  owned:false, active:false },
  { id:'freezebag',  icon:'❄️', name:'Congelar Saco',    price:7,  desc:'Congela o próximo saquinho por 8 segundos extras.',                      unlockAt:4,  owned:false, active:false }
];

const effects = {
  aimguide: false, aimguideShots: 0,
  multiball: false,
  slowtarget: false, slowUntil: 0,
  doublescore: false, doubleUntil: 0,
  magnet: false,
  freezebag: false, freezeExtra: 0
};

let splats = [], balls = [];
let nextColor = randColor();
let band = { pulling: false, tx: cx, ty: restY };
let chargeStart = null, charge = 0;
let totalScore = 0, consecutiveHits = 0;
let highScores = [], totalCoins = 0;
let TX = TARGET_BASE_X, TY = TARGET_BASE_Y;
let targetMoving = false, targetAngle = 0;
let moneybag = null, lastBagSpawn = performance.now();

const scoreEl   = document.getElementById('score-value');
const streakEl  = document.getElementById('score-streak');
const coinsEl   = document.getElementById('coins-display');
const floatEl   = document.getElementById('floating-scores');
const lbList    = document.getElementById('lb-list');
const flashEl   = document.getElementById('reset-flash');
const shopEl    = document.getElementById('shop');
const tooltipEl = document.getElementById('item-tooltip');
const activeEl  = document.getElementById('active-effects');

function randColor() { return 'hsl('+Math.floor(Math.random()*360)+',88%,58%)'; }
function project(wx, wy, wz) { var s=DEPTH/(DEPTH+wz); return {x:cx+(wx-cx)*s, y:cy+(wy-cy)*s, s:s}; }
function calcPoints(sx, sy) {
  var d = Math.hypot(sx-TX, sy-TY);
  for (var i=0; i<TARGET_RINGS.length; i++) if (d<=TARGET_RINGS[i].r) return TARGET_RINGS[i].pts;
  return 0;
}

// ── SHOP ──
function renderShop() {
  shopEl.innerHTML = '';
  SHOP_ITEMS.forEach(function(item) {
    var unlocked = totalCoins >= item.unlockAt || item.owned;
    var canBuy   = totalCoins >= item.price && !item.owned;
    var div = document.createElement('div');
    var cls = 'shop-item';
    if (item.owned) cls += ' owned';
    else if (unlocked) cls += ' unlocked';
    else cls += ' locked';
    div.className = cls;
    div.innerHTML =
      (item.active ? '<div class="active-badge">ATIVO</div>' : '') +
      '<div class="icon">'+item.icon+'</div>' +
      '<div class="price">'+(item.owned ? (item.active ? '✓ Ativo' : '✓ Pronto') : '🪙 '+item.price)+'</div>' +
      (!unlocked ? '<div class="lock">🔒</div>' : '');
    div.addEventListener('mouseenter', function() { showTooltip(item, unlocked, canBuy); });
    div.addEventListener('mouseleave', hideTooltip);
    if (unlocked && canBuy) div.addEventListener('click', function() { buyItem(item); });
    else if (item.owned && !item.active) div.addEventListener('click', function() { activateItem(item); });
    shopEl.appendChild(div);
  });
}

var tooltipTimer = null;
function showTooltip(item, unlocked, canBuy) {
  clearTimeout(tooltipTimer);
  var extra = '';
  if (!unlocked) extra = '<br><span style="color:#ff8c8c;font-size:11px">🔒 Desbloqueie com '+item.unlockAt+' 🪙</span>';
  else if (!item.owned) extra = '<br><span style="color:#ffd700;font-size:11px">Custo: '+item.price+' 🪙</span>';
  else if (!item.active) extra = '<br><span style="color:#7eff9a;font-size:11px">Clique para ativar!</span>';
  tooltipEl.innerHTML = '<strong>'+item.icon+' '+item.name+'</strong>'+item.desc+extra;
  tooltipEl.classList.add('show');
}
function hideTooltip() { tooltipTimer = setTimeout(function() { tooltipEl.classList.remove('show'); }, 300); }

function buyItem(item) {
  if (totalCoins < item.price) return;
  totalCoins -= item.price;
  item.owned = true;
  updateCoinsUI();
  renderShop();
  spawnFloat(item.icon+' Comprado!', W/2, cy-80, '#7eff9a', 20);
}

function activateItem(item) {
  item.active = true;
  var now = performance.now();
  if (item.id === 'aimguide')    { effects.aimguide = true; effects.aimguideShots = 3; }
  else if (item.id === 'multiball')   { effects.multiball = true; }
  else if (item.id === 'slowtarget')  { effects.slowtarget = true; effects.slowUntil = now + 20000; }
  else if (item.id === 'doublescore') { effects.doublescore = true; effects.doubleUntil = now + 15000; }
  else if (item.id === 'magnet')      { effects.magnet = true; }
  else if (item.id === 'freezebag')   { effects.freezebag = true; effects.freezeExtra = 8000; }
  renderShop();
  renderActiveEffects();
  spawnFloat(item.icon+' Ativado!', W/2, cy-80, '#ffd700', 20);
}

function deactivateItem(id) {
  var item = SHOP_ITEMS.find(function(i) { return i.id === id; });
  if (item) { item.active = false; item.owned = false; }
  renderShop();
  renderActiveEffects();
}

function renderActiveEffects() {
  var now = performance.now();
  var html = '';
  if (effects.doublescore && effects.doubleUntil > now) {
    var pct = (effects.doubleUntil - now) / 15000 * 60;
    html += '<div class="effect-badge">⭐ Pontos 2x<div class="ebar" style="width:'+pct+'px"></div></div>';
  }
  if (effects.slowtarget && effects.slowUntil > now) {
    var pct2 = (effects.slowUntil - now) / 20000 * 60;
    html += '<div class="effect-badge">🐢 Alvo Lento<div class="ebar" style="width:'+pct2+'px;background:#7ec8ff"></div></div>';
  }
  if (effects.aimguide)  html += '<div class="effect-badge">🎯 Mira ('+effects.aimguideShots+'x)</div>';
  if (effects.multiball) html += '<div class="effect-badge">🎱 Tiro Triplo</div>';
  if (effects.magnet)    html += '<div class="effect-badge">🧲 Ímã ativo</div>';
  if (effects.freezebag) html += '<div class="effect-badge">❄️ Saco +8s</div>';
  activeEl.innerHTML = html;
}

function updateCoinsUI() {
  coinsEl.textContent = '🪙 '+totalCoins+' moedas';
  coinsEl.style.transform = 'scale(1.25)';
  setTimeout(function() { coinsEl.style.transform = 'scale(1)'; }, 150);
  renderShop();
}

var MEDALS = ['🥇','🥈','🥉'], MEDAL_CLS = ['gold','silver','bronze'];
function renderLeaderboard(newScore) {
  lbList.innerHTML = '';
  highScores.slice(0,8).forEach(function(s, i) {
    var e = document.createElement('div');
    var cls = MEDAL_CLS[i] || '';
    e.className = 'lb-entry' + (cls ? ' '+cls : '');
    var isNew = s === newScore && highScores.indexOf(s) === i;
    e.innerHTML = (i<3 ? '<span class="lb-medal">'+MEDALS[i]+'</span>' : '<span class="lb-rank">'+(i+1)+'</span>') +
      '<span class="lb-pts '+cls+'">'+s+'</span>' + (isNew ? '<span class="lb-new">NEW</span>' : '');
    lbList.appendChild(e);
  });
}

function spawnFloat(txt, x, y, color, size) {
  size = size || 22;
  var d = document.createElement('div');
  d.textContent = txt;
  d.style.cssText = 'position:absolute;left:'+x+'px;top:'+y+'px;transform:translate(-50%,-50%);font-family:"Segoe UI",sans-serif;font-weight:800;font-size:'+size+'px;color:'+color+';text-shadow:0 0 12px rgba(0,0,0,0.8);pointer-events:none;white-space:nowrap;animation:floatUp 1.1s ease-out forwards;';
  floatEl.appendChild(d);
  setTimeout(function() { d.remove(); }, 1100);
}

var st = document.createElement('style');
st.textContent = '@keyframes floatUp{0%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}60%{opacity:1;transform:translate(-50%,-90%) scale(1)}100%{opacity:0;transform:translate(-50%,-130%) scale(0.8)}}';
document.head.appendChild(st);

function resetScore() {
  if (totalScore === 0) return;
  highScores.push(totalScore);
  highScores.sort(function(a,b) { return b-a; });
  renderLeaderboard(totalScore);
  flashEl.style.opacity = '1';
  setTimeout(function() { flashEl.style.opacity = '0'; }, 150);
  spawnFloat('💥 MISS!', TX, TY, '#ff4444', 28);
  totalScore = 0; consecutiveHits = 0;
  scoreEl.textContent = '0'; streakEl.textContent = '';
  targetMoving = false; targetAngle = 0;
  TX = TARGET_BASE_X; TY = TARGET_BASE_Y;
}

function addScore(pts, sx, sy) {
  if (pts <= 0) { resetScore(); return; }
  consecutiveHits++;
  var final = effects.doublescore ? pts*2 : pts;
  totalScore += final;
  scoreEl.textContent = totalScore;
  scoreEl.style.transform = 'scale(1.25)';
  setTimeout(function() { scoreEl.style.transform = 'scale(1)'; }, 120);
  streakEl.textContent = consecutiveHits >= 3 ? '🔥 '+consecutiveHits+'x combo!' : '';
  if (totalScore >= 300) targetMoving = true;
  var label = effects.doublescore ? '+'+final+' ×2!' : (pts===100 ? '+'+pts+' 🎯' : '+'+pts);
  var color = pts===100 ? '#ff4444' : pts>=50 ? '#ffaa00' : '#fff';
  spawnFloat(label, sx, sy, color, 20+pts/10);
}

// ── MONEYBAG ──
function spawnMoneybag() {
  var margin = 80;
  var x = margin + Math.random()*(W-margin*2);
  var y = margin + Math.random()*(H*0.6-margin);
  var coins = 3 + Math.floor(Math.random()*18);
  var lifetime = 15000 - ((coins-3)/17)*5000;
  if (effects.freezebag) {
    lifetime += effects.freezeExtra;
    effects.freezebag = false;
    deactivateItem('freezebag');
  }
  moneybag = { x:x, y:y, spawnedAt:performance.now(), radius:BAG_RADIUS, coins:coins, lifetime:lifetime };
}

function drawMoneybag(bag) {
  var now = performance.now();
  var age = now - bag.spawnedAt;
  var life = age / bag.lifetime;
  var alpha = 1;
  if (life < 0.08) alpha = life/0.08;
  if (life > 0.7)  alpha = 1-(life-0.7)/0.3;
  alpha = Math.max(0, Math.min(1, alpha));
  var pulse = 1 + 0.08*Math.sin(age*0.012);
  var glowHue = 60 - life*60;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(bag.x, bag.y);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = 'hsl('+glowHue+',100%,55%)';
  ctx.shadowBlur = 18+life*14;
  ctx.font = (BAG_RADIUS*1.7)+'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('💰', 0, 0);
  ctx.shadowBlur = 0;
  ctx.font = 'bold 12px Segoe UI';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 4;
  ctx.fillText('+'+bag.coins+(effects.magnet?'×2':'')+' 🪙', 0, BAG_RADIUS+14);
  ctx.beginPath();
  ctx.arc(0, 0, BAG_RADIUS+6, -Math.PI/2, -Math.PI/2+(1-life)*Math.PI*2);
  ctx.strokeStyle = 'hsl('+glowHue+',90%,60%)';
  ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.shadowBlur = 0; ctx.stroke();
  ctx.restore();
}

function checkBagHit(sx, sy) {
  if (!moneybag) return;
  if (Math.hypot(sx-moneybag.x, sy-moneybag.y) <= moneybag.radius+20) {
    var c = moneybag.coins;
    if (effects.magnet) { c *= 2; effects.magnet = false; deactivateItem('magnet'); }
    totalCoins += c;
    updateCoinsUI();
    spawnFloat('+'+c+' 🪙', moneybag.x, moneybag.y-20, '#ffd700', 26);
    moneybag = null;
  }
}

// ── DRAW ──
function drawTarget() {
  ctx.save();
  for (var i=TARGET_RINGS.length-1; i>=0; i--) {
    var r = TARGET_RINGS[i];
    ctx.beginPath(); ctx.arc(TX,TY,r.r,0,Math.PI*2);
    ctx.fillStyle = r.color; ctx.globalAlpha = 0.13; ctx.fill();
    ctx.strokeStyle = r.color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.35; ctx.stroke();
  }
  ctx.globalAlpha = 0.18; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(TX-270,TY); ctx.lineTo(TX+270,TY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(TX,TY-270); ctx.lineTo(TX,TY+270); ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.55; ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (var j=0; j<TARGET_RINGS.length; j++) ctx.fillText(TARGET_RINGS[j].label, TX+TARGET_RINGS[j].r-14, TY-5);
  ctx.restore();
}

function drawSplat(s) {
  ctx.save(); ctx.translate(s.x, s.y);
  for (var i=0; i<s.blobs.length; i++) {
    var b = s.blobs[i];
    ctx.beginPath(); ctx.ellipse(b.dx,b.dy,b.rx,b.ry,b.rot,0,Math.PI*2);
    ctx.fillStyle = s.color; ctx.globalAlpha = s.alpha*b.a; ctx.fill();
  }
  ctx.restore();
}

function createSplat(x, y, color) {
  var blobs = [];
  var n = 16 + Math.floor(Math.random()*10);
  for (var i=0; i<n; i++) {
    var a=Math.random()*Math.PI*2, d=Math.random()*70;
    blobs.push({ dx:Math.cos(a)*d, dy:Math.sin(a)*d, rx:8+Math.random()*35, ry:5+Math.random()*22, rot:Math.random()*Math.PI, a:0.4+Math.random()*0.6 });
  }
  splats.push({ x:x, y:y, color:color, alpha:1, blobs:blobs, createdAt:performance.now() });
  checkBagHit(x, y);
  addScore(calcPoints(x, y), x, y);
}

function drawAimGuide() {
  var pdx=band.tx-cx, pdy=band.ty-restY;
  var pd=Math.hypot(pdx,pdy);
  if (pd<10) return;
  var power=Math.max(0.08,charge);
  var bp=Math.pow(power,0.5);
  var vzRate=DEPTH/(40+(1-bp)*30);
  var g=0.18, tW=DEPTH/vzRate;
  var nx=-pdx/pd, ny=-pdy/pd;
  var spread=bp*Math.max(W,H)*1.15;
  var twx=band.tx+nx*spread, twy=band.ty+ny*spread;
  var vx=(twx-band.tx)/tW;
  var vy=(twy-band.ty)/tW - 0.5*g*tW;
  var dots=[];
  for (var t=2; t<=tW; t+=tW/18) {
    var wz=vzRate*t, wx=band.tx+vx*t, wy=band.ty+vy*t+0.5*g*t*t;
    var p=project(wx,wy,wz);
    dots.push({ x:p.x, y:p.y, s:p.s, frac:t/tW });
  }
  var lwx=band.tx+vx*tW, lwy=band.ty+vy*tW+0.5*g*tW*tW;
  var lp=project(lwx,lwy,DEPTH);
  ctx.save();
  for (var i=0; i<dots.length; i++) {
    var dot=dots[i];
    ctx.beginPath(); ctx.arc(dot.x,dot.y,3*dot.s,0,Math.PI*2);
    ctx.fillStyle=nextColor; ctx.globalAlpha=0.2+0.5*dot.frac; ctx.fill();
  }
  ctx.globalAlpha=0.9;
  ctx.strokeStyle=nextColor; ctx.lineWidth=2;
  ctx.shadowColor=nextColor; ctx.shadowBlur=8;
  var cs=14;
  ctx.beginPath(); ctx.moveTo(lp.x-cs,lp.y); ctx.lineTo(lp.x+cs,lp.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lp.x,lp.y-cs); ctx.lineTo(lp.x,lp.y+cs); ctx.stroke();
  ctx.beginPath(); ctx.arc(lp.x,lp.y,cs*0.6,0,Math.PI*2);
  ctx.globalAlpha=0.6; ctx.stroke();
  ctx.shadowBlur=0; ctx.restore();
}

function drawProgressBar(c) {
  var bw=200,bh=16,bx=cx-bw/2,by=cy+50,r=bh/2;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,r); ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fill();
  var hue=120-c*120, fw=Math.max(c*bw,r*2);
  ctx.beginPath(); ctx.roundRect(bx,by,fw,bh,r); ctx.fillStyle='hsl('+hue+',90%,50%)'; ctx.fill();
  ctx.shadowColor='hsl('+hue+',90%,55%)'; ctx.shadowBlur=10+c*14;
  ctx.beginPath(); ctx.roundRect(bx,by,fw,bh,r); ctx.fillStyle='hsla('+hue+',90%,70%,0.3)'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,r); ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

function drawSlingshot(bx, by) {
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=12; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy+20); ctx.lineTo(cx,cy-10); ctx.strokeStyle='#5c3d1e'; ctx.lineWidth=14; ctx.stroke();
  [leftFork,rightFork].forEach(function(f) {
    ctx.beginPath(); ctx.moveTo(cx,cy-10); ctx.lineTo(f.x,f.y); ctx.strokeStyle='#5c3d1e'; ctx.lineWidth=10; ctx.stroke();
  });
  ctx.shadowBlur=0;
  [leftFork,rightFork].forEach(function(f) {
    ctx.beginPath(); ctx.arc(f.x,f.y,7,0,Math.PI*2); ctx.fillStyle='#8b6234'; ctx.fill();
  });
  ctx.lineWidth=3; ctx.strokeStyle='#c8a86b';
  ctx.beginPath(); ctx.moveTo(leftFork.x,leftFork.y); ctx.lineTo(bx,by); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rightFork.x,rightFork.y); ctx.lineTo(bx,by); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx,by,12,0,Math.PI*2);
  var g=ctx.createRadialGradient(bx-3,by-3,2,bx,by,12);
  g.addColorStop(0,'#fff'); g.addColorStop(1,nextColor);
  ctx.fillStyle=g; ctx.fill();
}

function shoot() {
  var pdx=band.tx-cx, pdy=band.ty-restY;
  var pd=Math.hypot(pdx,pdy);
  if (pd<10) return;
  var power=Math.max(0.08,charge);
  var bp=Math.pow(power,0.5);
  var vzRate=DEPTH/(40+(1-bp)*30);
  var g=0.18, tW=DEPTH/vzRate;
  var nx=-pdx/pd, ny=-pdy/pd;
  var spread=bp*Math.max(W,H)*1.15;
  var twx=band.tx+nx*spread, twy=band.ty+ny*spread;
  var vx=(twx-band.tx)/tW;
  var vy=(twy-band.ty)/tW - 0.5*g*tW;

  if (effects.aimguide) {
    effects.aimguideShots--;
    if (effects.aimguideShots <= 0) { effects.aimguide=false; deactivateItem('aimguide'); }
    else renderActiveEffects();
  }

  if (effects.multiball) {
    var angles = [-0.18, 0, 0.18];
    for (var i=0; i<angles.length; i++) {
      var da=angles[i], cos=Math.cos(da), sin=Math.sin(da);
      var rvx=vx*cos-vy*sin, rvy=vx*sin+vy*cos;
      balls.push({ wx0:band.tx, wy0:band.ty, wz:0, wx:band.tx, wy:band.ty, vx:rvx, vy:rvy, vzRate:vzRate, gravity:g, t:0, r:11+Math.random()*5, color:randColor(), trail:[], dead:false });
    }
    effects.multiball = false;
    deactivateItem('multiball');
  } else {
    balls.push({ wx0:band.tx, wy0:band.ty, wz:0, wx:band.tx, wy:band.ty, vx:vx, vy:vy, vzRate:vzRate, gravity:g, t:0, r:11+Math.random()*5, color:nextColor, trail:[], dead:false });
  }

  nextColor=randColor(); charge=0; chargeStart=null;
  document.getElementById('hint').style.opacity='0';
}

function animate() {
  var now = performance.now();
  if (band.pulling && chargeStart!==null) charge=Math.min((now-chargeStart)/CHARGE_TIME,1);
  if (effects.doublescore && now>=effects.doubleUntil) { effects.doublescore=false; deactivateItem('doublescore'); }
  if (effects.slowtarget  && now>=effects.slowUntil)   { effects.slowtarget=false;  deactivateItem('slowtarget'); }
  if (targetMoving) {
    var spd = effects.slowtarget ? 0.0048 : 0.012;
    targetAngle += spd;
    TX = TARGET_BASE_X + Math.sin(targetAngle)*W*0.28;
    TY = TARGET_BASE_Y + Math.sin(targetAngle*0.6)*H*0.08;
  }
  if (!moneybag && now-lastBagSpawn>=BAG_INTERVAL) { spawnMoneybag(); lastBagSpawn=now; }
  if (moneybag && now-moneybag.spawnedAt>=moneybag.lifetime) { moneybag=null; lastBagSpawn=now; }

  ctx.globalAlpha=1; ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
  drawTarget();
  if (moneybag) drawMoneybag(moneybag);

  for (var i=0; i<splats.length; i++) {
    var age=now-splats[i].createdAt;
    if (age>5000) splats[i].alpha=Math.max(0,1-(age-5000)/1500);
  }
  splats = splats.filter(function(s) { return s.alpha>0; });
  splats.forEach(drawSplat);

  for (var i=0; i<balls.length; i++) {
    var b=balls[i];
    b.t++; b.wz=b.vzRate*b.t; b.wx=b.wx0+b.vx*b.t; b.wy=b.wy0+b.vy*b.t+0.5*b.gravity*b.t*b.t;
    var p=project(b.wx,b.wy,b.wz);
    b.trail.push({x:p.x,y:p.y,s:p.s}); if (b.trail.length>16) b.trail.shift();
    for (var j=0; j<b.trail.length; j++) {
      var pt=b.trail[j], frac=j/b.trail.length;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,b.r*pt.s*frac,0,Math.PI*2);
      ctx.fillStyle=b.color; ctx.globalAlpha=frac*0.4; ctx.fill();
    }
    ctx.globalAlpha=1;
    var r=b.r*p.s;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
    var bg=ctx.createRadialGradient(p.x-r*.3,p.y-r*.3,r*.1,p.x,p.y,r);
    bg.addColorStop(0,'#fff'); bg.addColorStop(1,b.color);
    ctx.fillStyle=bg; ctx.fill();
    if (b.wz>=DEPTH) { var wp=project(b.wx,b.wy,DEPTH); createSplat(wp.x,wp.y,b.color); b.dead=true; }
    if (p.x<-300||p.x>W+300||p.y>H+200) b.dead=true;
  }
  balls = balls.filter(function(b) { return !b.dead; });

  drawSlingshot(band.tx, band.ty);
  if (band.pulling && charge>0) drawProgressBar(charge);
  if (band.pulling && effects.aimguide) drawAimGuide();
  if (!band.pulling) { band.tx+=(cx-band.tx)*0.15; band.ty+=(restY-band.ty)*0.15; }
  renderActiveEffects();
  requestAnimationFrame(animate);
}

canvas.addEventListener('mousemove', function(e) { if(band.pulling){band.tx=e.clientX;band.ty=e.clientY;} });
canvas.addEventListener('mousedown', function(e) { band.pulling=true;band.tx=e.clientX;band.ty=e.clientY;chargeStart=performance.now();charge=0; });
canvas.addEventListener('mouseup',   function()  { if(!band.pulling)return; band.pulling=false; shoot(); });
canvas.addEventListener('touchstart',function(e) { e.preventDefault();band.pulling=true;band.tx=e.touches[0].clientX;band.ty=e.touches[0].clientY;chargeStart=performance.now();charge=0; },{passive:false});
canvas.addEventListener('touchmove', function(e) { e.preventDefault();if(band.pulling){band.tx=e.touches[0].clientX;band.ty=e.touches[0].clientY;} },{passive:false});
canvas.addEventListener('touchend',  function(e) { e.preventDefault();band.pulling=false;shoot(); });

renderShop();
animate();
</script>
</body>
</html>
