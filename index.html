<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isabela's Lab ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* ===================== THEME VARIABLES ===================== */
    :root {
      --bg:              #FDFBF7;
      --dot:             rgba(221,167,123,0.45);
      --surface:         rgba(255,255,255,0.88);
      --surface-solid:   #F5EFE4;
      --border:          rgba(221,167,123,0.28);
      --text:            #5C4A42;
      --text-muted:      #9B8B80;
      --accent:          #DDA77B;
      --accent-h:        #C8905F;
      --accent2:         #E29596;
      --accent3:         #8A9A86;
      --tag-bg:          rgba(221,167,123,0.13);
      --tag-color:       #A07050;
      --card-bg:         rgba(255,255,255,0.92);
      --card-border:     rgba(221,167,123,0.22);
      --card-shadow:     0 4px 24px rgba(92,74,66,0.07);
      --card-hover-shadow: 0 8px 32px rgba(221,167,123,0.22);
      --overlay-bg:      rgba(55,35,25,0.84);
      --modal-backdrop:  rgba(0,0,0,0.45);
      --header-bg:       rgba(253,251,247,0.93);
    }

    [data-theme="dark"] {
      --bg:              #0f172a;
      --dot:             rgba(6,182,212,0.22);
      --surface:         rgba(15,23,42,0.92);
      --surface-solid:   #1e293b;
      --border:          rgba(6,182,212,0.16);
      --text:            #e2e8f0;
      --text-muted:      #64748b;
      --accent:          #06b6d4;
      --accent-h:        #0891b2;
      --accent2:         #a78bfa;
      --accent3:         #6ee7b7;
      --tag-bg:          rgba(6,182,212,0.1);
      --tag-color:       #06b6d4;
      --card-bg:         rgba(30,41,59,0.96);
      --card-border:     rgba(6,182,212,0.13);
      --card-shadow:     0 4px 24px rgba(0,0,0,0.32);
      --card-hover-shadow: 0 8px 32px rgba(6,182,212,0.18);
      --overlay-bg:      rgba(8,12,24,0.88);
      --modal-backdrop:  rgba(0,0,0,0.68);
      --header-bg:       rgba(15,23,42,0.96);
    }

    /* ===================== BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(var(--dot) 0.6px, transparent 0.6px);
      background-size: 28px 28px;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.5s, color 0.5s;
    }

    /* ===================== HEADER ===================== */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: background 0.5s, border-color 0.5s;
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .site-logo {
      font-family: 'Caveat', cursive;
      font-size: 1.65rem; font-weight: 700;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 0.3rem;
      transition: opacity 0.2s;
    }
    .site-logo:hover { opacity: 0.8; }
    .logo-accent { color: var(--accent); }
    .header-controls { display: flex; align-items: center; gap: 0.5rem; }
    .ctrl-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 0.85rem;
      background: var(--surface-solid);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    .ctrl-btn:hover {
      background: var(--accent); border-color: var(--accent);
      color: white; transform: translateY(-1px);
    }
    .ctrl-btn svg { width: 13px; height: 13px; }

    /* ===================== HERO ===================== */
    .hero {
      max-width: 1100px; margin: 0 auto;
      padding: 3.5rem 1.5rem 2.5rem;
      display: flex; align-items: center; gap: 2.5rem;
    }
    @media (max-width: 640px) {
      .hero { flex-direction: column; text-align: center; padding: 2rem 1.25rem 1.75rem; gap: 1.5rem; }
    }
    .avatar-wrap { flex-shrink: 0; position: relative; cursor: pointer; animation: float 6s ease-in-out infinite; }
    .avatar-wrap img {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 3.5px solid var(--accent);
      object-fit: cover;
      background: var(--surface-solid);
      transition: border-color 0.5s, box-shadow 0.3s;
    }
    .avatar-wrap:hover img {
      box-shadow: 0 0 0 5px var(--accent), 0 0 22px rgba(221,167,123,0.3);
    }
    [data-theme="dark"] .avatar-wrap:hover img {
      box-shadow: 0 0 0 5px var(--accent), 0 0 22px rgba(6,182,212,0.35);
    }
    .avatar-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 2px dashed var(--accent); opacity: 0.35;
      animation: spin 22s linear infinite; pointer-events: none;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes spin  { to{transform:rotate(360deg)} }

    .hero-content h1 {
      font-family: 'Caveat', cursive;
      font-size: clamp(2rem, 5vw, 3rem); font-weight: 700;
      color: var(--text); line-height: 1.2; margin-bottom: 0.6rem;
      transition: color 0.5s;
    }
    .hero-content h1 .accent { color: var(--accent); }
    .hero-content p {
      font-size: 1rem; line-height: 1.75;
      color: var(--text-muted); max-width: 480px;
      transition: color 0.5s;
    }
    @media (max-width: 640px) { .hero-content p { margin: 0 auto; } }

    /* ===================== TYPED SUBTITLE ===================== */
    .typed-subtitle {
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--accent3);
      margin-bottom: 0.55rem; min-height: 1.3em;
      transition: color 0.5s;
    }
    [data-theme="dark"] .typed-subtitle { color: var(--accent); opacity: 0.85; }
    .typed-cursor {
      display: inline-block; width: 2px; height: 0.85em;
      background: var(--accent); margin-left: 2px; vertical-align: middle;
      animation: blink 0.85s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ===================== KONAMI TOAST ===================== */
    .konami-toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--card-bg); border: 1.5px solid var(--accent);
      padding: 0.55rem 1.3rem; border-radius: 999px;
      font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700;
      color: var(--text); z-index: 9999; pointer-events: none;
      opacity: 0; transition: opacity 0.4s, transform 0.4s;
      box-shadow: 0 8px 28px rgba(0,0,0,0.14);
    }
    .konami-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===================== COUNTER BADGE ===================== */
    .counter-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.75rem;
      background: var(--tag-bg);
      border: 1.5px solid var(--accent); border-radius: 999px;
      font-family: 'Nunito', sans-serif; font-size: 0.75rem; font-weight: 800;
      color: var(--accent); margin-left: auto; align-self: center;
      transition: background 0.5s, border-color 0.5s, color 0.5s;
    }

    .magic-word {
      font-weight: 700; color: var(--accent2); cursor: pointer;
      text-decoration: underline wavy var(--accent2);
      text-decoration-thickness: 2px; text-underline-offset: 3px;
      transition: all 0.2s; display: inline-block;
    }
    .magic-word:hover { color: var(--accent); text-decoration-color: var(--accent); transform: translateY(-1px); }
    [data-theme="dark"] .magic-word { color: var(--accent); text-decoration-color: var(--accent); }
    [data-theme="dark"] .magic-word:hover { color: var(--accent2); text-shadow: 0 0 8px var(--accent); }

    .hero-actions {
      display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap;
    }
    @media (max-width: 640px) { .hero-actions { justify-content: center; } }

    .action-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.1rem; border-radius: 999px;
      font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
      text-decoration: none; cursor: pointer; border: none;
      transition: all 0.2s; touch-action: manipulation;
    }
    .action-btn.primary { background: var(--accent); color: white; }
    .action-btn.primary:hover {
      background: var(--accent-h); transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(221,167,123,0.38);
    }
    [data-theme="dark"] .action-btn.primary:hover {
      box-shadow: 0 4px 14px rgba(6,182,212,0.38);
    }
    .action-btn.ghost {
      background: var(--surface-solid);
      border: 1.5px solid var(--border); color: var(--text-muted);
    }
    .action-btn.ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .action-btn svg { width: 15px; height: 15px; }
    .action-btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* ===================== DIVIDER ===================== */
    .section-divider {
      max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
      border: none; border-top: 1px solid var(--border); transition: border-color 0.5s;
    }

    /* ===================== LAB SECTION ===================== */
    .lab-section { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
    .section-heading {
      display: flex; align-items: baseline; flex-wrap: wrap;
      gap: 0.75rem; margin-bottom: 1.5rem;
    }
    .section-heading h2 {
      font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700;
      color: var(--text); transition: color 0.5s;
    }
    .section-comment {
      font-family: 'Courier New', monospace; font-size: 0.85rem;
      color: var(--accent3); opacity: 0.75;
    }
    [data-theme="dark"] .section-comment { color: var(--accent); opacity: 0.6; }

    /* ===================== FILTERS ===================== */
    .filters-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.35rem 0.9rem;
      background: var(--surface-solid);
      border: 1.5px solid var(--border); border-radius: 999px;
      color: var(--text-muted);
      font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; touch-action: manipulation;
    }
    .filter-pill:hover, .filter-pill.active {
      background: var(--accent); border-color: var(--accent); color: white;
    }

    /* ===================== CARDS ===================== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 18px; overflow: hidden; cursor: pointer;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    }
    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--accent);
    }

    /* Preview image */
    .card-preview { position: relative; aspect-ratio: 16/9; overflow: hidden; }
    .card-preview img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s;
    }
    .project-card:hover .card-preview img { transform: scale(1.06); }

    /* Emoji placeholder */
    .card-preview-emoji {
      aspect-ratio: 16/9; position: relative;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-solid); font-size: 4rem;
    }

    /* Hover overlay */
    .card-overlay {
      position: absolute; inset: 0; background: var(--overlay-bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.25rem; text-align: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .project-card:hover .card-overlay { opacity: 1; }
    .overlay-short-desc {
      color: rgba(255,255,255,0.92); font-size: 0.875rem;
      line-height: 1.55; margin-bottom: 0.8rem;
    }
    .overlay-cta { color: #fbbf7a; font-size: 0.78rem; font-weight: 700; }
    [data-theme="dark"] .overlay-cta { color: #67e8f9; }

    /* Status badge */
    .status-badge {
      position: absolute; top: 0.65rem; right: 0.65rem; z-index: 2;
      padding: 0.2rem 0.65rem; border-radius: 999px;
      font-size: 0.68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .status-live    { background: #10b981; color: white; }
    .status-wip     { background: #f59e0b; color: white; }
    .status-planned { background: #8b5cf6; color: white; }

    /* Card body */
    .card-body { padding: 1rem 1.25rem 1.25rem; }
    .card-title-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem; }
    .card-emoji { font-size: 1.25rem; line-height: 1; }
    .card-title-row h3 { font-size: 1rem; font-weight: 700; color: var(--text); transition: color 0.5s; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .tag-pill {
      background: var(--tag-bg); color: var(--tag-color);
      padding: 0.15rem 0.55rem; border-radius: 999px;
      font-size: 0.7rem; font-weight: 700;
      transition: background 0.3s, color 0.3s;
    }
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 3.5rem 1rem; color: var(--text-muted);
    }
    .empty-state .big-emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }

    /* ===================== MODAL ===================== */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: var(--modal-backdrop);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 22px;
      max-width: 560px; width: 100%; max-height: 90vh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      transform: scale(0.95) translateY(14px);
      transition: transform 0.3s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    }
    .modal-backdrop.open .modal-box { transform: scale(1) translateY(0); }

    .modal-img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
      border-radius: 18px 18px 0 0;
    }
    .modal-emoji-placeholder {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-solid); font-size: 5rem;
      border-radius: 18px 18px 0 0;
    }
    .modal-body { padding: 1.5rem 1.75rem 1.75rem; }
    .modal-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .modal-title-row { display: flex; align-items: center; gap: 0.6rem; }
    .modal-emoji { font-size: 2rem; line-height: 1; }
    .modal-title {
      font-family: 'Caveat', cursive; font-size: 1.6rem; font-weight: 700;
      color: var(--text);
    }
    .modal-close-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-solid); border: 1.5px solid var(--border);
      color: var(--text-muted); cursor: pointer; flex-shrink: 0;
      transition: all 0.2s; touch-action: manipulation;
    }
    .modal-close-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .modal-close-btn svg { width: 14px; height: 14px; }
    .modal-description {
      color: var(--text-muted); font-size: 0.925rem; line-height: 1.72;
      margin-bottom: 1.25rem; transition: color 0.5s;
    }
    .modal-meta-section { margin-bottom: 1rem; }
    .modal-learned {
      margin-bottom: 1.25rem;
      padding: 0.85rem 1rem;
      background: var(--tag-bg);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
    }
    .modal-learned .meta-label { margin-bottom: 0.45rem; color: var(--accent); }
    .learned-text {
      font-size: 0.9rem; line-height: 1.7;
      color: var(--text); margin: 0;
    }
    .meta-label {
      font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.4rem;
    }
    .modal-actions {
      margin-top: 1.5rem; padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }

    /* ===================== PARTICLES ===================== */
    #particles-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
    .particle {
      position: absolute; pointer-events: none;
      animation: particle-fly 1.1s ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { opacity: 1; transform: translate(0,0) scale(0.7) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(1.1) rotate(var(--rot)); }
    }

    /* ===================== TEAPOT ===================== */
    .coffee-stream {
      position: absolute; top: -10px; left: 32px;
      width: 8px; height: 0;
      background-color: #6b4c3a; border-radius: 4px;
      opacity: 0; z-index: 10;
    }
    [data-theme="dark"] .coffee-stream { background-color: #06b6d4; }
    .animate-stream { animation: pour-stream 6s ease-in-out forwards; }
    @keyframes pour-stream {
      0%,30%  { height:0; opacity:0; }
      38%     { opacity:1; height:38px; }
      58%     { height:38px; opacity:1; }
      68%,100%{ height:38px; opacity:0; }
    }
    .steam-container {
      top:-6px; left:50%; transform:translateX(-50%);
      width:52px; height:40px; overflow:visible; z-index:25;
    }
    .steam-wisp {
      display:block; width:14px; height:24px; border-radius:50%;
      background:radial-gradient(ellipse at center,rgba(90,90,100,.55) 0%,rgba(70,70,80,.2) 45%,transparent 100%);
      filter:blur(5px); opacity:0;
    }
    [data-theme="dark"] .steam-wisp {
      background:radial-gradient(ellipse at center,rgba(6,182,212,.45) 0%,rgba(6,182,212,.1) 45%,transparent 100%);
    }
    .animate-container { animation:slide-in-out 6s cubic-bezier(.34,1.56,.64,1) forwards; }
    .animate-teapot    { animation:tilt-teapot 6s ease-in-out forwards; }
    .steam-container.animate-steam .steam-wisp:nth-child(1){ animation:steam-rise 3s ease-in-out .8s forwards; }
    .steam-container.animate-steam .steam-wisp:nth-child(2){ animation:steam-rise 3.2s ease-in-out 1.4s forwards; }
    .steam-container.animate-steam .steam-wisp:nth-child(3){ animation:steam-rise 2.8s ease-in-out 2s forwards; }
    @keyframes slide-in-out  { 0%,100%{right:-200px} 12%,88%{right:20px} }
    @keyframes tilt-teapot   { 0%,18%,82%,100%{transform:translateY(0) rotate(0deg)} 32%,68%{transform:translateY(-15px) translateX(-5px) rotate(-35deg)} }
    @keyframes steam-rise    { 0%{transform:translateY(0) translateX(0) scale(1);opacity:0} 12%{opacity:.6} 70%{opacity:.18} 100%{transform:translateY(-36px) translateX(5px) scale(1.2);opacity:0} }

    /* ===================== FOOTER ===================== */
    .site-footer {
      border-top: 1px solid var(--border);
      text-align: center; padding: 1.5rem 1rem;
      color: var(--text-muted); font-size: 0.8rem;
      transition: color 0.5s, border-color 0.5s;
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="site-logo">🧪 <span class="logo-accent">Isabela's</span> Lab</a>
      <div class="header-controls">
        <button class="ctrl-btn" id="themeToggle" aria-label="Toggle theme">
          <i data-feather="moon" id="themeIcon"></i>
          <span id="themeLabel">dark</span>
        </button>
        <button class="ctrl-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">PT</span>
        </button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="avatar-wrap" id="avatarBtn" title="click me!">
      <div class="avatar-ring"></div>
      <img id="avatarImg"
        src="https://api.dicebear.com/7.x/notionists/svg?seed=Isabela&backgroundColor=fdfbf7"
        alt="Isabela's avatar">
    </div>
    <div class="hero-content">

    let lang         = localStorage.getItem("lab-lang")  || "en";

    /* ==============================================

    ============================================== */
    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute("data-theme", t);
      document.getElementById("avatarImg").src = AVATARS[t];
      const icon  = document.getElementById("themeIcon");
      const label = document.getElementById("themeLabel");
      icon.setAttribute("data-feather", t === "dark" ? "sun" : "moon");
      label.textContent = t === "dark" ? UI[lang].themeLight : UI[lang].themeDark;
      feather.replace();
      localStorage.setItem("lab-theme", t);
    }

    /* ==============================================
       LANGUAGE
    ============================================== */
    function applyLang(l) {
      lang = l;
      document.documentElement.lang = l;
      document.getElementById("heroH1").innerHTML        = getGreeting(l);
      document.getElementById("heroBio").innerHTML       = UI[l].heroBio;
      document.getElementById("sectionTitle").textContent  = UI[l].sectionTitle;

      document.getElementById("footerText").textContent  = UI[l].footer;

      document.getElementById("langLabel").textContent   = UI[l].langToggle;
      document.getElementById("themeLabel").textContent  = theme === "dark" ? UI[l].themeLight : UI[l].themeDark;

      renderCards();
      document.getElementById("counterLabel").textContent = UI[l].counterLabel;
      startTyping(UI[l].typedLine);
      localStorage.setItem("lab-lang", l);

    /* ==============================================
       FILTERS
    ============================================== */
    function renderFilters() {
      const row = document.getElementById("filtersRow");
      row.innerHTML = "";
      row.appendChild(makeFilterPill(UI[lang].filterAll, "all"));
      const tags = [...new Set(PROJECTS.flatMap(p => p.tags))];
      tags.forEach(t => row.appendChild(makeFilterPill((TAG_EMOJI[t] ? TAG_EMOJI[t] + " " : "") + t, t)));
    }

    function makeFilterPill(label, value) {
      const btn = document.createElement("button");
      btn.className = "filter-pill" + (activeFilter === value ? " active" : "");
      btn.textContent = label;
      btn.onclick = () => { activeFilter = value; renderFilters(); renderCards(); };
      return btn;
    }

    /* ==============================================
       CARDS
    ============================================== */
    function statusLabel(s) {
      const map = { live: UI[lang].statusLive, wip: UI[lang].statusWip, planned: UI[lang].statusPlanned };
      return map[s] || s;
    }

    function renderCards() {
      const grid = document.getElementById("projectsGrid");
      grid.innerHTML = "";
      const list = activeFilter === "all"
        ? PROJECTS
        : PROJECTS.filter(p => p.tags.includes(activeFilter));

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><div class="big-emoji">🔬</div><p>Nothing here yet…</p></div>`;
        return;
      }

      list.forEach(p => {
        const card = document.createElement("article");
        card.className = "project-card";
        card.setAttribute("role", "button");
        card.setAttribute("tabindex", "0");
        card.onclick = () => openModal(p.id);
        card.onkeydown = e => { if (e.key === "Enter" || e.key === " ") openModal(p.id); };

        const preview = p.image
          ? `<div class="card-preview">
               <img src="${p.image}" alt="${p.title[lang]}" loading="lazy">
               <div class="card-overlay">
                 <p class="overlay-short-desc">${p.shortDesc[lang]}</p>
                 <span class="overlay-cta">${UI[lang].overlayHint}</span>
               </div>
               <span class="status-badge status-${p.status}">${statusLabel(p.status)}</span>

          : `<div class="card-preview-emoji">
               ${p.emoji}
               <span class="status-badge status-${p.status}">${statusLabel(p.status)}</span>
             </div>`;

        ).join("");

        card.innerHTML = `
          ${preview}
          <div class="card-body">
            <div class="card-title-row">
              <span class="card-emoji">${p.emoji}</span>
              <h3>${p.title[lang]}</h3>
            </div>
            <div class="tags-row">${tagPills}</div>
          </div>`;

        grid.appendChild(card);
      });

    /* ==============================================

    ============================================== */

      const p = PROJECTS.find(pr => pr.id === id);
      if (!p) return;

      const imgHtml = p.image
        ? `<img class="modal-img" src="${p.image}" alt="${p.title[lang]}">`
        : `<div class="modal-emoji-placeholder">${p.emoji}</div>`;

      const openBtn = p.status === "planned"
        ? `<button class="action-btn ghost" disabled>${UI[lang].statusPlanned}…</button>`

    /* ==============================================
       PARTICLES
    ============================================== */
    document.addEventListener("click", e => {
      const word = e.target.closest(".magic-word");
      if (!word) return;
      const key  = word.dataset.magic || "";
      const pool = PARTICLES[key] || ["✨","🌟","💫"];
      const rect = word.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      for (let i = 0; i < 9; i++) spawnParticle(cx, cy, pool[i % pool.length]);
      if (key === "coffee" || key === "café") triggerTeapot();
    });

    function spawnParticle(x, y, emoji) {
      const el    = document.createElement("div");
      el.className = "particle";
      el.textContent = emoji;
      const angle = Math.random() * Math.PI * 2;
      const dist  = 65 + Math.random() * 80;
      const rot   = (Math.random() - 0.5) * 260;
      el.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      el.style.setProperty("--dy", (Math.sin(angle) * dist - 35) + "px");
      el.style.setProperty("--rot", rot + "deg");
      el.style.left = x + "px";
      el.style.top  = y + "px";
      el.style.fontSize = (0.85 + Math.random() * 0.85) + "rem";
      document.getElementById("particles-layer").appendChild(el);
      el.addEventListener("animationend", () => el.remove(), { once: true });
    }

    /* ==============================================

    ============================================== */
    function triggerTeapot() {
      const c  = document.getElementById("teapot-container");
      const tp = document.getElementById("teapot-emoji");
      const st = document.getElementById("coffee-stream");
      const sc = document.getElementById("steam-container");
      [c,tp,st,sc].forEach(el =>
        el.classList.remove("animate-container","animate-teapot","animate-stream","animate-steam")
      );
      void c.offsetWidth;
      c.classList.add("animate-container");
      tp.classList.add("animate-teapot");
      st.classList.add("animate-stream");
      sc.classList.add("animate-steam");
    }

    /* ==============================================
       TIME-BASED GREETING
    ============================================== */
    function getGreeting(l) {
      const h = new Date().getHours();
      const greet = h < 5  ? (l === "en" ? "Good night 🌙"     : "Boa noite 🌙")
                 : h < 12 ? (l === "en" ? "Good morning ☀️"   : "Bom dia ☀️")
                 : h < 18 ? (l === "en" ? "Good afternoon 🌤️" : "Boa tarde 🌤️")
                 : h < 22 ? (l === "en" ? "Good evening 🌙"   : "Boa noite 🌙")
                 :           (l === "en" ? "Good night 🌙"     : "Boa noite 🌙");
      return l === "en"
        ? `${greet}, I'm <span class="accent">Isabela</span>!`
        : `${greet}, eu sou a <span class="accent">Isabela</span>!`;
    }

      planned: "coming soon... 💭"
    };

    const badgeTooltip = document.createElement("div");
    badgeTooltip.style.cssText = `
      position:fixed; z-index:9998; padding:0.3rem 0.65rem;
      background:var(--card-bg); border:1.5px solid var(--border);
      border-radius:8px; font-family:'Nunito',sans-serif;
      font-size:0.72rem; font-weight:700; color:var(--text);
      pointer-events:none; opacity:0; transition:opacity 0.15s;
      box-shadow:0 4px 14px rgba(0,0,0,0.1); white-space:nowrap;
    `;
    document.body.appendChild(badgeTooltip);

    document.addEventListener("mouseover", e => {
      const badge = e.target.closest(".status-badge");
      if (!badge) return;
      const status = [...badge.classList].find(c => c.startsWith("status-") && c !== "status-badge")?.replace("status-","");
      const text = STATUS_TOOLTIP[status];
      if (!text) return;
      const r = badge.getBoundingClientRect();
      badgeTooltip.textContent = text;
      badgeTooltip.style.top  = (r.bottom + 6) + "px";
      badgeTooltip.style.left = r.right + "px";
      badgeTooltip.style.transform = "translateX(-100%)";
      badgeTooltip.style.opacity = "1";
    });
    document.addEventListener("mouseout", e => {
      if (e.target.closest(".status-badge")) badgeTooltip.style.opacity = "0";
    });

    /* ==============================================
       KONAMI CODE
    ============================================== */
    const KONAMI_SEQ = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
    let konamiIdx = 0;

    const konamiToast = document.createElement("div");
    konamiToast.className = "konami-toast";
    konamiToast.textContent = "🎮 cheat code activated! you found the secret ✨";
    document.body.appendChild(konamiToast);

    document.addEventListener("keydown", e => {
      if (e.key === KONAMI_SEQ[konamiIdx]) {
        konamiIdx++;
        if (konamiIdx === KONAMI_SEQ.length) {
          konamiIdx = 0;
          triggerKonami();
        }
      } else {
        konamiIdx = e.key === KONAMI_SEQ[0] ? 1 : 0;
      }
    });

    function triggerKonami() {
      const pool = ["🌟","✨","💫","🎉","🎊","🪄","🔮","💥","🚀","⭐","🎮","🕹️"];
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const cx = Math.random() * window.innerWidth;
          const cy = Math.random() * window.innerHeight * 0.7;
          spawnParticle(cx, cy, pool[i % pool.length]);
        }, i * 40);
      }
      konamiToast.classList.add("show");
      setTimeout(() => konamiToast.classList.remove("show"), 3000);
    }

    /* ==============================================
       TYPING ANIMATION
    ============================================== */
    let typingTimer = null;

    function startTyping(text) {
      const el = document.getElementById("typedText");
      const cursor = document.getElementById("typedCursor");
      el.textContent = "";
      cursor.style.display = "inline-block";
      if (typingTimer) clearInterval(typingTimer);
      let i = 0;
      typingTimer = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) {
          clearInterval(typingTimer);
          typingTimer = null;
          setTimeout(() => { cursor.style.display = "none"; }, 1800);
        }
      }, 38);
    }

    /* ==============================================
       COUNTER ANIMATION
    ============================================== */
    function animateCounter(target) {
      const badge = document.getElementById("counterBadge");
      const label = document.getElementById("counterLabel");
      label.textContent = UI[lang].counterLabel;
      let count = 0;
      const step = Math.ceil(target / 18);
      const timer = setInterval(() => {
        count = Math.min(count + step, target);
        badge.firstChild.textContent = count + " ";
        if (count >= target) clearInterval(timer);
      }, 55);
    }

    /* ==============================================
       INIT
    ============================================== */
    document.addEventListener("DOMContentLoaded", () => {
      // Apply theme first (sets avatar + icon)
      applyTheme(theme);
      // Apply language (renders all text + cards + filters)
      applyLang(lang);

      // Controls
      document.getElementById("themeToggle").addEventListener("click", () => applyTheme(theme === "light" ? "dark" : "light"));
      document.getElementById("langToggle").addEventListener("click",  () => applyLang(lang === "en" ? "pt" : "en"));
      document.getElementById("avatarBtn").addEventListener("click",   () => applyTheme(theme === "light" ? "dark" : "light"));

      // Counter observer
      const counterObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            animateCounter(PROJECTS.length);
            counterObserver.disconnect();
          }
        });
      }, { threshold: 0.5 });
      counterObserver.observe(document.getElementById("counterBadge"));

      // Modal close
      document.getElementById("modalBackdrop").addEventListener("click", e => {
        if (e.target === document.getElementById("modalBackdrop")) closeModal();
      });
      document.addEventListener("keydown", e => { if (e.key === "Escape" && modalOpen) closeModal(); });
    });
  </script>
</body>
</html>
